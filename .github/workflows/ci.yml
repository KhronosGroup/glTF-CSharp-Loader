name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release:
        description: 'Publish the exact version from the csproj as a release (unchecked = preview).'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-publish:
    name: Build, test, and publish
    # A single job so the slow runner queue is paid once. It must run on Windows
    # because the loader tests target .NET Framework (net462); packing and the
    # OIDC publish run fine on Windows too.
    runs-on: windows-latest
    permissions:
      id-token: write  # required for OIDC trusted publishing
      contents: read
    env:
      IS_UPSTREAM: ${{ github.repository == 'KhronosGroup/glTF-CSharp-Loader' }}
      IS_PUBLISH_EVENT: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout glTF-CSharp-Loader
        uses: actions/checkout@v5
        with:
          path: glTF-CSharp-Loader

      # The code generator and its tests read the core glTF schema from a sibling glTF repo.
      - name: Checkout glTF (schema)
        uses: actions/checkout@v5
        with:
          repository: KhronosGroup/glTF
          path: glTF
          fetch-depth: 1

      # The loader tests load every model from a sibling glTF-Sample-Assets repo.
      # It is large, so shallow-clone it and cache the working tree (without .git) between runs.
      - name: Determine glTF-Sample-Assets commit
        id: assets
        shell: bash
        run: echo "sha=$(git ls-remote https://github.com/KhronosGroup/glTF-Sample-Assets.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache glTF-Sample-Assets
        id: cache-assets
        uses: actions/cache@v5
        with:
          path: glTF-Sample-Assets
          key: gltf-sample-assets-${{ steps.assets.outputs.sha }}

      - name: Clone glTF-Sample-Assets
        if: steps.cache-assets.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/KhronosGroup/glTF-Sample-Assets.git glTF-Sample-Assets
          rm -rf glTF-Sample-Assets/.git

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      # Build/test the specific projects rather than the whole solution so the code
      # generator does not run and regenerate the checked-in schema during CI.
      - name: Test generator
        working-directory: glTF-CSharp-Loader
        run: dotnet test GeneratorUnitTests/GeneratorUnitTests.csproj -c Release

      - name: Test loader
        working-directory: glTF-CSharp-Loader
        run: dotnet test glTFLoaderUnitTests/glTFLoaderUnitTests.csproj -c Release

      # Push to main publishes a preview (<base>-preview.<run_number>). A manual run with
      # "release" checked publishes the exact version from the csproj; otherwise it also
      # publishes a preview (useful for validating publishing on demand). On pull requests
      # this just validates that the package still packs.
      - name: Compute version
        id: version
        shell: bash
        working-directory: glTF-CSharp-Loader
        run: |
          csproj_version=$(grep -oPm1 '(?<=<Version>)[^<]+' glTFLoader/glTFLoader.csproj)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.release }}" = "true" ]; then
            echo "version=${csproj_version}" >> "$GITHUB_OUTPUT"
          else
            base=$(echo "$csproj_version" | sed -E 's/-.*$//')
            echo "version=${base}-preview.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        working-directory: glTF-CSharp-Loader
        run: dotnet pack glTFLoader/glTFLoader.csproj -c Release -p:ContinuousIntegrationBuild=true -p:GeneratePackageOnBuild=false -p:Version=${{ steps.version.outputs.version }} -o artifacts

      # The published package only depends on files under glTFLoader/. Skip publishing
      # when a push changed nothing there (docs, tests, the generator, or the workflow)
      # so we don't publish an identical preview. A manual dispatch always publishes.
      - name: Check for package changes
        id: pkg
        if: env.IS_PUBLISH_EVENT == 'true' && env.IS_UPSTREAM == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif ! files=$(gh api "repos/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}" --jq '.files[].filename'); then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not determine changed files; publishing to be safe."
          elif echo "$files" | grep -q '^glTFLoader/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes under glTFLoader/; skipping NuGet publish."
          fi

      # Trusted publishing: exchange the GitHub OIDC token for a short-lived nuget.org API
      # key. Only runs on the upstream repository for publish events (push to main or a
      # manual dispatch) when the package project changed; pull requests and forks build
      # and pack but do not publish.
      - name: NuGet login (OIDC)
        id: login
        if: env.IS_PUBLISH_EVENT == 'true' && env.IS_UPSTREAM == 'true' && steps.pkg.outputs.changed == 'true'
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        if: env.IS_PUBLISH_EVENT == 'true' && env.IS_UPSTREAM == 'true' && steps.pkg.outputs.changed == 'true'
        working-directory: glTF-CSharp-Loader
        run: dotnet nuget push "artifacts/glTF2Loader.${{ steps.version.outputs.version }}.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Note that publishing was skipped
        if: env.IS_PUBLISH_EVENT == 'true' && env.IS_UPSTREAM != 'true'
        run: echo "::warning::Not the upstream repository - packed ${{ steps.version.outputs.version }} but did not publish."

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: nupkg
          path: glTF-CSharp-Loader/artifacts/*.nupkg
